services:
  - type: web
    name: college-enquiry-chatbot
    env: python

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app

    envVars:
      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        sync: false

      - key: MYSQL_HOST
        sync: false

      - key: MYSQL_PORT
        value: 24937    # <-- 3306 இல்லை

      - key: MYSQL_USER
        sync: false

      - key: MYSQL_PASSWORD
        sync: false

      - key: MYSQL_DATABASE
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: GEMINI_MODEL
        value: gemini-2.5-flash