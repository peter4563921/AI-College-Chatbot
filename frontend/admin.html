<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - College Chatbot</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="admin-layout">
    <aside class="sidebar glass">
      <h1>Admin Dashboard</h1>
      <p>Manage chatbot knowledge base</p>
      <nav id="resourceNav"></nav>
      <a class="admin-link" href="index.html">Open Chatbot</a>
    </aside>

    <section class="dashboard glass">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">KVCET Knowledge Base</p>
          <h2 id="resourceTitle">Login</h2>
        </div>
        <button id="logoutBtn" class="ghost-btn" type="button">Logout</button>
      </header>

      <form id="loginForm" class="admin-form auth-form">
        <input id="adminEmail" type="email" placeholder="Admin email" value="admin@kvcet.edu" required>
        <input id="adminPassword" type="password" placeholder="Password" value="admin123" required>
        <button type="submit">Login</button>
      </form>

      <section id="crudArea" class="crud-area hidden">
        <form id="crudForm" class="admin-form"></form>
        <div id="records" class="records"></div>
      </section>
    </section>
  </main>
  <script src="js/admin.js"></script>
</body>
</html>
